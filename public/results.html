<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results – FAST Track Reading & Math</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple: #7c3aed; --purple-soft: #ede9fe;
      --orange: #f59e0b; --orange-soft: #fffbeb;
      --green: #10b981; --green-soft: #d1fae5;
      --red: #ef4444; --red-soft: #fee2e2;
      --bg: linear-gradient(135deg, #faf5ff 0%, #fff7ed 100%);
      --surface: #ffffff; --border: rgba(0,0,0,0.08);
      --text: #1e1b4b; --muted: #6b7280; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* CONFETTI */
    .confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    .page { max-width: 600px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }

    /* PERFECT BANNER */
    .perfect-banner {
      background: linear-gradient(135deg, #f59e0b, #ec4899);
      color: #fff; border-radius: 20px;
      text-align: center; padding: 20px;
      font-size: 1.5rem; font-weight: 800;
      margin-bottom: 28px;
      animation: pulse-banner 1s ease-in-out infinite alternate;
    }
    @keyframes pulse-banner { from { transform: scale(1); } to { transform: scale(1.02); } }

    /* STARS DISPLAY */
    .stars-row {
      text-align: center; margin-bottom: 8px;
      font-size: 2.8rem;
    }
    .score-label { text-align: center; font-size: 1.1rem; color: var(--muted); font-weight: 600; margin-bottom: 28px; }

    /* XP / REWARDS */
    .reward-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(124,58,237,0.10);
      padding: 24px; margin-bottom: 24px;
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    }
    .xp-earned { font-size: 2rem; font-weight: 800; color: var(--purple); }
    .xp-label { font-size: 0.85rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .level-info { flex: 1; }
    .level-name { font-size: 1rem; font-weight: 700; }
    .xp-bar-wrap { height: 10px; background: #e5e7eb; border-radius: 99px; margin-top: 8px; overflow: hidden; }
    .xp-bar-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width 1s; }
    .xp-bar-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    /* ANSWERS LIST */
    .answers-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(124,58,237,0.08);
      padding: 24px; margin-bottom: 28px;
    }
    .answers-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
    .answer-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 0.95rem; }
    .ans-icon { font-size: 1.1rem; flex-shrink: 0; }
    .ans-text { line-height: 1.4; }

    /* BUTTONS */
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      flex: 1; min-width: 140px; padding: 15px;
      background: var(--purple); color: #fff; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; text-align: center; text-decoration: none;
      display: inline-block; transition: background 0.15s;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary {
      flex: 1; min-width: 140px; padding: 15px;
      background: var(--surface); color: var(--text); border: 2px solid var(--border);
      border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; text-align: center; text-decoration: none;
      display: inline-block; transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--purple-soft); border-color: var(--purple); }

    /* XP LOSS BANNER */
    .xp-loss-banner {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff; border-radius: 20px;
      text-align: center; padding: 18px 20px;
      font-size: 1.05rem; font-weight: 700; line-height: 1.45;
      margin-bottom: 24px;
      animation: pulse-banner 1s ease-in-out infinite alternate;
    }

    /* WEEKLY GOAL BANNER */
    .goal-banner {
      background: linear-gradient(135deg,#7c3aed,#10b981); color:#fff;
      border-radius: 20px; text-align: center; padding: 20px;
      font-size: 1.1rem; font-weight: 700; margin-bottom: 24px;
      animation: pulse-banner 1s ease-in-out infinite alternate;
    }

    /* WRITING PROMPT */
    .writing-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(124,58,237,0.08);
      padding: 22px; margin-bottom: 20px;
    }
    .writing-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .writing-card p { font-size: 0.88rem; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
    .writing-textarea {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-family: inherit; font-size: 0.95rem;
      resize: vertical; outline: none; transition: border-color 0.15s;
      line-height: 1.5; min-height: 90px;
    }
    .writing-textarea:focus { border-color: var(--purple); }
    .writing-submit {
      margin-top: 10px; padding: 10px 22px;
      background: var(--purple); color: #fff; border: none;
      border-radius: 10px; font-size: 0.92rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .writing-submit:hover { background: #6d28d9; }

    /* ADAPTIVE SUGGESTION */
    .adaptive-card {
      background: var(--blue-soft); border: 2px solid var(--blue);
      border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .adaptive-emoji { font-size: 2.2rem; flex-shrink: 0; }
    .adaptive-body { flex: 1; min-width: 0; }
    .adaptive-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--blue); margin-bottom: 3px; }
    .adaptive-title { font-size: 1rem; font-weight: 800; color: var(--text); margin-bottom: 2px; }
    .adaptive-meta  { font-size: 0.82rem; color: var(--muted); }
    .adaptive-btn {
      flex-shrink: 0; padding: 9px 16px; background: var(--blue); color: #fff;
      border-radius: 10px; font-size: 0.88rem; font-weight: 700;
      text-decoration: none; white-space: nowrap;
    }

    /* CSS Confetti */
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      width: 10px; height: 16px;
      border-radius: 3px;
      animation: confetti-fall linear infinite;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="confetti-container"></div>

  <div class="page">
    <div id="perfect-banner" style="display:none;" class="perfect-banner">🏆 Perfect Score! Amazing job!</div>
    <div id="xp-loss-banner" style="display:none;" class="xp-loss-banner"></div>

    <!-- Level Up Banner -->
    <div id="level-up-banner" style="display:none;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border-radius:20px;text-align:center;padding:24px 20px;margin-bottom:28px;animation:pulse-banner 1s ease-in-out infinite alternate;">
      <div style="font-size:2.6rem;margin-bottom:6px;" id="level-up-emoji">⭐</div>
      <div style="font-size:1.7rem;font-weight:800;letter-spacing:0.02em;">LEVEL UP!</div>
      <div style="font-size:1.1rem;font-weight:700;opacity:0.92;margin-top:4px;" id="level-up-name"></div>
    </div>

    <!-- Weekly goal banner -->
    <div id="goal-banner" style="display:none;" class="goal-banner">
      🎯 Weekly goal complete! You hit your reading goal this week!
    </div>

    <!-- Streak banner -->
    <div id="streak-banner" style="display:none;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border:2px solid #10b981;border-radius:16px;text-align:center;padding:14px 20px;margin-bottom:24px;">
      <div id="streak-text" style="font-size:1.05rem;font-weight:800;color:#065f46;"></div>
    </div>

    <!-- New badges -->
    <div id="new-badges-section" style="display:none;margin-bottom:24px;">
      <div style="background:linear-gradient(135deg,#fef9c3,#fef3c7);border:2px solid #fcd34d;border-radius:16px;padding:18px 20px;">
        <div style="font-size:0.95rem;font-weight:800;color:#78350f;margin-bottom:12px;">🏅 Badge Earned!</div>
        <div id="new-badges-list" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;"></div>
      </div>
    </div>

    <!-- Math unlock celebration (shown first time math unlocks) -->
    <div id="math-unlock-banner" style="display:none;
      background:linear-gradient(135deg,#2563eb,#10b981);color:#fff;
      border-radius:20px;padding:20px;text-align:center;
      font-size:1.1rem;font-weight:700;margin-bottom:24px;">
      🎉 You unlocked the <strong>Math Zone!</strong><br>
      <a href="math.html" style="color:#fff;display:inline-block;margin-top:10px;
        padding:10px 20px;background:rgba(255,255,255,0.25);border-radius:10px;
        text-decoration:none;font-size:1rem;">
        Go to Math Zone 📐 →
      </a>
    </div>

    <div class="stars-row" id="stars-row"></div>
    <div class="score-label" id="score-label"></div>

    <div class="reward-card">
      <div>
        <div class="xp-earned" id="xp-earned">+0 XP</div>
        <div class="xp-label">Experience earned</div>
      </div>
      <div class="level-info">
        <div class="level-name" id="level-name"></div>
        <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xp-bar-fill" style="width:0%"></div></div>
        <div class="xp-bar-label" id="xp-bar-label"></div>
      </div>
    </div>

    <div class="answers-card">
      <h3>Your Answers</h3>
      <div id="answers-list"></div>
    </div>

    <!-- Writing prompt -->
    <div class="writing-card" id="writing-card">
      <h3>✍️ Reflect on What You Read</h3>
      <p id="writing-prompt-text"></p>
      <textarea class="writing-textarea" id="writing-response" placeholder="Write your thoughts here…"></textarea>
      <div style="display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;">
        <button class="writing-submit" id="writing-submit">Submit Response</button>
        <div id="writing-status" style="font-size:0.85rem;font-weight:600;min-height:1.2em;"></div>
      </div>
    </div>

    <!-- Adaptive suggestion (low score) -->
    <div class="adaptive-card" id="adaptive-card" style="display:none;">
      <div class="adaptive-emoji" id="adaptive-emoji">📖</div>
      <div class="adaptive-body">
        <div class="adaptive-label">Try this next</div>
        <div class="adaptive-title" id="adaptive-title"></div>
        <div class="adaptive-meta" id="adaptive-meta"></div>
      </div>
      <a class="adaptive-btn" id="adaptive-link" href="#">Read →</a>
    </div>

    <div class="btn-row">
      <a href="library.html" class="btn-primary">📚 Back to Library</a>
      <a id="try-again-btn" href="#" class="btn-secondary">🔄 Try Again</a>
    </div>
  </div>

  <script src="stories.js"></script>
  <script src="/__/firebase/10.0.0/firebase-app-compat.js"></script>
  <script src="/__/firebase/10.0.0/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/init.js"></script>
  <script>
    const BADGES = [
      { id: 'first_story',   emoji: '📖', name: 'First Story',    desc: 'Read your first story' },
      { id: 'story_5',       emoji: '📚', name: 'Bookworm',       desc: 'Read 5 stories' },
      { id: 'story_10',      emoji: '🌟', name: 'Story Chaser',   desc: 'Read 10 stories' },
      { id: 'story_20',      emoji: '🏆', name: 'Story Champion', desc: 'Read 20 stories' },
      { id: 'perfect_score', emoji: '💯', name: 'Perfect Score',  desc: '5/5 stars on a quiz' },
      { id: 'math_unlock',   emoji: '🔓', name: 'Math Explorer',  desc: 'Unlocked Math Zone' },
      { id: 'math_first',    emoji: '🔢', name: 'Math Starter',   desc: 'First math quiz done' },
      { id: 'math_5',        emoji: '📐', name: 'Math Master',    desc: 'Completed 5 topics' },
      { id: 'streak_3',      emoji: '🔥', name: '3-Day Streak',   desc: 'Read 3 days in a row' },
      { id: 'streak_7',      emoji: '⚡', name: 'Week Warrior',   desc: 'Read 7 days in a row' },
      { id: 'streak_14',     emoji: '🌙', name: 'Two-Week Champ', desc: 'Read 14 days in a row' },
      { id: 'xp_500',        emoji: '💎', name: 'XP Hunter',      desc: 'Earned 500 total XP' },
    ];
    function checkNewBadges(stats, currentBadges) {
      const earned = new Set(currentBadges);
      return [
        ['first_story',   stats.storiesRead >= 1],
        ['story_5',       stats.storiesRead >= 5],
        ['story_10',      stats.storiesRead >= 10],
        ['story_20',      stats.storiesRead >= 20],
        ['perfect_score', stats.hadPerfect],
        ['math_unlock',   stats.mathUnlocked],
        ['math_first',    stats.mathTopics >= 1],
        ['math_5',        stats.mathTopics >= 5],
        ['streak_3',      stats.streak >= 3],
        ['streak_7',      stats.streak >= 7],
        ['streak_14',     stats.streak >= 14],
        ['xp_500',        stats.totalXp >= 500],
      ].filter(([id, cond]) => cond && !earned.has(id)).map(([id]) => id);
    }
    function getWeekStart() {
      const now = new Date();
      const day = now.getDay();
      const diff = now.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(now.getFullYear(), now.getMonth(), diff).toISOString().slice(0, 10);
    }
    function showLevelUp(lvl) {
      document.getElementById('level-up-emoji').textContent = lvl.emoji;
      document.getElementById('level-up-name').textContent = 'You\'re now a ' + lvl.name + '!';
      document.getElementById('level-up-banner').style.display = 'block';
    }
    function showStreakBanner(streak) {
      if (streak < 2) return;
      const f = streak >= 14 ? '🌙🔥' : streak >= 7 ? '⚡🔥' : '🔥';
      document.getElementById('streak-text').textContent = f + ' ' + streak + '-day reading streak! Amazing!';
      document.getElementById('streak-banner').style.display = 'block';
    }
    function showBadges(newBadgeIds) {
      if (!newBadgeIds.length) return;
      const map = Object.fromEntries(BADGES.map(b => [b.id, b]));
      document.getElementById('new-badges-list').innerHTML = newBadgeIds.map(id => {
        const b = map[id] || { emoji: '🏅', name: id, desc: '' };
        return `<div style="background:#fff;border-radius:12px;padding:10px 14px;text-align:center;min-width:80px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <div style="font-size:2rem;">${b.emoji}</div>
          <div style="font-size:0.78rem;font-weight:800;margin-top:4px;">${b.name}</div>
          <div style="font-size:0.68rem;color:#6b7280;margin-top:2px;">${b.desc}</div>
        </div>`;
      }).join('');
      document.getElementById('new-badges-section').style.display = 'block';
    }

    const LEVELS = [
      { name: 'Bookworm',     minXp: 0,    emoji: '📖' },
      { name: 'Reader',       minXp: 100,  emoji: '📚' },
      { name: 'Word Hunter',  minXp: 200,  emoji: '🔍' },
      { name: 'Explorer',     minXp: 300,  emoji: '🗺️' },
      { name: 'Thinker',      minXp: 450,  emoji: '🧠' },
      { name: 'Scholar',      minXp: 600,  emoji: '🎓' },
      { name: 'Achiever',     minXp: 800,  emoji: '⚡' },
      { name: 'Champion',     minXp: 1000, emoji: '🏆' },
      { name: 'Super Reader', minXp: 1500, emoji: '🌟' },
      { name: 'Eagle Eye',    minXp: 1850, emoji: '🦅' },
      { name: 'Story Master', minXp: 2200, emoji: '🚀' },
      { name: 'Prodigy',      minXp: 2600, emoji: '💎' },
      { name: 'Summer Hero',  minXp: 3000, emoji: '☀️' },
      { name: 'Grand Master', minXp: 3500, emoji: '👑' },
      { name: 'FAST Legend',  minXp: 4000, emoji: '🌈' },
    ];
    function getLevel(xp) {
      let idx = 0;
      for (let i = 0; i < LEVELS.length; i++) { if (xp >= LEVELS[i].minXp) idx = i; }
      return { level: LEVELS[idx], nextLevel: LEVELS[idx + 1] || null, levelIdx: idx };
    }
    function calcRewards(score, earnedXpOverride) {
      const stars = score;
      // Use pre-calculated XP from anti-cheat quiz if available
      const xp = (earnedXpOverride != null)
        ? earnedXpOverride
        : (score * 20 + (score === 5 ? 25 : 0));
      return { stars, xp };
    }

    const profile = (() => { try { return JSON.parse(localStorage.getItem('readerProfile')); } catch(e) { return null; } })();
    if (!profile) { window.location.href = 'index.html'; }

    const raw = sessionStorage.getItem('quizResult');
    if (!raw) { window.location.href = 'library.html'; }
    const result = JSON.parse(raw);
    const story = STORIES.find(s => s.id === result.storyId);
    if (!story) { window.location.href = 'library.html'; }

    const { stars, xp } = calcRewards(result.score, result.earnedXP);
    document.getElementById('try-again-btn').href = 'quiz.html?story=' + result.storyId;

    // ── Mark activity (clears inactivity decay) ──────────────────────────────
    (function markActivity() {
      const todayStr = new Date().toISOString().slice(0, 10);
      localStorage.setItem('lastActivityDate_' + profile.readerId, todayStr);
      localStorage.setItem('inactivityDecay_' + profile.readerId, '0');
      localStorage.setItem('decayCheckedDate_' + profile.readerId, todayStr);
    })();

    // Stars
    let starsHtml = '';
    for (let i = 0; i < 5; i++) starsHtml += i < stars ? '⭐' : '☆';
    document.getElementById('stars-row').textContent = starsHtml;
    document.getElementById('score-label').textContent = result.score + ' out of ' + result.total + ' correct';

    // Perfect — requires all 5 correct AND all first-try (if anti-cheat data present)
    const isPerfect = result.score === 5 &&
      (result.perfectFirstTry !== false); // legacy results without perfectFirstTry still celebrate
    if (isPerfect) {
      document.getElementById('perfect-banner').style.display = 'block';
      startConfetti();
    }

    // Math Zone unlock check — trigger on score ≥ 3
    const MATH_UNLOCK_KEY   = 'mathUnlocked_' + profile.readerId;
    const MATH_UNLOCK_SCORE = 3;
    if (result.score >= MATH_UNLOCK_SCORE && localStorage.getItem(MATH_UNLOCK_KEY) !== 'true') {
      localStorage.setItem(MATH_UNLOCK_KEY, 'true');
      document.getElementById('math-unlock-banner').style.display = 'block';
      if (!isPerfect) startConfetti(); // celebrate unlock too
    }

    // XP — handle negative (too many wrong answers)
    if (xp < 0) {
      const lostXp = Math.abs(xp);
      document.getElementById('xp-earned').textContent = '−' + lostXp + ' XP';
      document.getElementById('xp-earned').style.color = 'var(--red)';
      document.querySelector('.xp-label').textContent   = 'Experience lost 📉';
      const lossBanner = document.getElementById('xp-loss-banner');
      lossBanner.style.display = 'block';
      lossBanner.innerHTML = `📉 Oops! You lost <strong>${lostXp} XP</strong> from too many wrong answers.<br>Keep trying — you can earn it back!`;
    } else {
      document.getElementById('xp-earned').textContent = '+' + xp + ' XP';
    }

    // Load XP + stats + run post-quiz updates
    const db = firebase.firestore();
    const todayStr   = new Date().toISOString().slice(0, 10);
    const weekStart  = getWeekStart();

    Promise.all([
      db.collection('Progress').where('readerId', '==', profile.readerId).get(),
      db.collection('MathProgress').where('readerId', '==', profile.readerId).get(),
      db.collection('StudentStats').doc(profile.readerId).get()
    ]).then(([readSnap, mathSnap, statsSnap]) => {
      // ── XP totals ──────────────────────────────────────────────────────────
      let priorReadXp = 0, priorMathXp = 0;
      let hadPerfect = isPerfect;
      const uniqueStories = new Set();
      const uniqueMath = new Set();
      readSnap.forEach(d => {
        const data = d.data();
        priorReadXp += (data.xpEarned || 0);
        uniqueStories.add(data.storyId);
        if ((data.starsEarned || 0) >= 5) hadPerfect = true;
      });
      mathSnap.forEach(d => {
        const data = d.data();
        priorMathXp += (data.xpEarned || 0);
        uniqueMath.add(data.setId);
      });
      const priorXp    = priorReadXp + priorMathXp;
      const totalXp    = Math.max(0, priorXp + xp);
      const oldLvlData = getLevel(Math.max(0, priorXp));
      const newLvlData = getLevel(totalXp);

      // XP bar
      const { level, nextLevel } = newLvlData;
      document.getElementById('level-name').textContent = level.emoji + ' ' + level.name;
      if (nextLevel) {
        const pct = Math.min(100, Math.max(0, ((totalXp - level.minXp) / (nextLevel.minXp - level.minXp)) * 100));
        document.getElementById('xp-bar-fill').style.width = pct + '%';
        document.getElementById('xp-bar-label').textContent = totalXp + ' / ' + nextLevel.minXp + ' XP → ' + nextLevel.name;
      } else {
        document.getElementById('xp-bar-fill').style.width = '100%';
        document.getElementById('xp-bar-label').textContent = '🌈 FAST Legend! ' + totalXp + ' XP!';
      }
      // Level-up?
      if (newLvlData.levelIdx > oldLvlData.levelIdx) {
        showLevelUp(level);
        if (!isPerfect) startConfetti();
      }

      // ── Streak ─────────────────────────────────────────────────────────────
      const sd = statsSnap.exists ? statsSnap.data() : {};
      const lastReadDate = sd.lastReadDate || '';
      let currentStreak = sd.currentStreak || 0;
      let longestStreak = sd.longestStreak || 0;
      const isFirstToday = lastReadDate !== todayStr;
      if (isFirstToday) {
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0, 10);
        currentStreak = lastReadDate === yStr ? currentStreak + 1 : 1;
        longestStreak = Math.max(longestStreak, currentStreak);
        showStreakBanner(currentStreak);
      }

      // Weekly counts
      const isNewWeek = (sd.weekStartDate || '') !== weekStart;
      const storiesThisWeek = (isNewWeek ? 0 : (sd.storiesThisWeek || 0)) + 1;
      const mathThisWeek    = isNewWeek ? 0 : (sd.mathThisWeek || 0);

      // Weekly goal celebration
      const weeklyGoal = profile.weeklyGoalStories || 3;
      const prevWeekStories = isNewWeek ? 0 : (sd.storiesThisWeek || 0);
      if (storiesThisWeek >= weeklyGoal && prevWeekStories < weeklyGoal) {
        document.getElementById('goal-banner').style.display = 'block';
        if (!isPerfect && newLvlData.levelIdx <= oldLvlData.levelIdx) startConfetti();
      }

      // ── Badges ─────────────────────────────────────────────────────────────
      const currentBadges = sd.badges || [];
      const storiesRead = uniqueStories.has(result.storyId) ? uniqueStories.size : uniqueStories.size + 1;
      const newBadgeIds = checkNewBadges({
        storiesRead, hadPerfect,
        mathUnlocked: localStorage.getItem(MATH_UNLOCK_KEY) === 'true',
        mathTopics:   uniqueMath.size,
        streak:       currentStreak,
        totalXp
      }, currentBadges);
      showBadges(newBadgeIds);

      // ── Write StudentStats ──────────────────────────────────────────────────
      db.collection('StudentStats').doc(profile.readerId).set({
        readerId: profile.readerId,
        currentStreak, longestStreak,
        lastReadDate: todayStr, weekStartDate: weekStart,
        storiesThisWeek, mathThisWeek,
        badges: [...currentBadges, ...newBadgeIds],
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true }).catch(() => {});

      // ── Write StudentActivity ───────────────────────────────────────────────
      db.collection('StudentActivity').add({
        readerId: profile.readerId, readerName: profile.name,
        type: 'story', storyId: result.storyId,
        title: result.storyTitle || story.title,
        starsEarned: stars, xpEarned: xp,
        date: todayStr, timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(() => {});

    }).catch(() => {
      const { level } = getLevel(Math.max(0, xp));
      document.getElementById('level-name').textContent = level.emoji + ' ' + level.name;
    });

    // Answers
    const questions = story.questions;
    const answersEl = document.getElementById('answers-list');
    answersEl.innerHTML = result.answers.map((a, i) => {
      const q = questions[i];
      return `<div class="answer-row">
        <span class="ans-icon">${a.correct ? '✅' : '❌'}</span>
        <span class="ans-text">${q ? q.question : 'Question ' + (i+1)}</span>
      </div>`;
    }).join('');

    // Write to Firestore — only once
    if (!sessionStorage.getItem('quizWritten')) {
      sessionStorage.setItem('quizWritten', 'true');
      db.collection('Progress').add({
        readerId: profile.readerId,
        readerName: profile.name,
        storyId: result.storyId,
        storyTitle: result.storyTitle || story.title,
        storyTopic: result.storyTopic || story.topic,
        quizScore: result.score,
        quizTotal: result.total,
        starsEarned: stars,
        xpEarned: xp,
        perfectFirstTry: result.perfectFirstTry || false,
        answers: result.answers || [],
        completedAt: firebase.firestore.FieldValue.serverTimestamp(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(err => console.error('Firestore write failed:', err));
    }

    // ─── Writing prompt ────────────────────────────────────────────────────────
    (function () {
      const literaryTopics = new Set(['character','perspective','folktale','adventure']);
      const prompt = literaryTopics.has(story.topic)
        ? 'In 2–3 sentences, describe how the main character changed from the beginning to the end of this story.'
        : 'What is the most interesting fact or idea from this passage? Explain why it stood out to you.';
      document.getElementById('writing-prompt-text').textContent = prompt;

      document.getElementById('writing-textarea') && document.getElementById('writing-response').addEventListener('focus', function() {
        this.style.borderColor = 'var(--purple)';
      });
      document.getElementById('writing-response').addEventListener('blur', function() {
        this.style.borderColor = 'var(--border)';
      });

      document.getElementById('writing-submit').addEventListener('click', function() {
        const text = document.getElementById('writing-response').value.trim();
        const status = document.getElementById('writing-status');
        if (!text) { status.style.color = 'var(--red)'; status.textContent = 'Write something first!'; return; }
        this.disabled = true; this.textContent = 'Saving…';
        db.collection('WritingResponses').add({
          readerId:   profile.readerId,
          readerName: profile.name,
          storyId:    story.id,
          storyTitle: story.title,
          prompt:     prompt,
          response:   text,
          stars:      stars,
          date:       todayStr,
          timestamp:  firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
          status.style.color = 'var(--green)'; status.textContent = '✅ Saved!';
          this.textContent = 'Submitted ✓'; this.style.background = 'var(--green)';
        }).catch(() => {
          status.style.color = 'var(--red)'; status.textContent = 'Could not save — try again.';
          this.disabled = false; this.textContent = 'Submit Response';
        });
      });
    })();

    // ─── Adaptive suggestion (shown when score < 3 stars) ─────────────────────
    (function () {
      if (stars >= 3) return;
      const grade = parseInt(profile.gradeLevel) || 4;
      const FAV_KEY = 'favorites_' + profile.readerId;
      db.collection('Progress').where('readerId', '==', profile.readerId).get().then(snap => {
        const read = new Set();
        snap.forEach(d => read.add(d.data().storyId));
        const suggestion = STORIES.find(s =>
          s.id !== story.id &&
          !read.has(s.id) &&
          s.topic === story.topic &&
          Array.isArray(s.grades) && s.grades.includes(grade)
        ) || STORIES.find(s =>
          s.id !== story.id &&
          !read.has(s.id) &&
          Array.isArray(s.grades) && s.grades.includes(grade)
        );
        if (!suggestion) return;
        document.getElementById('adaptive-emoji').textContent = suggestion.coverEmoji;
        document.getElementById('adaptive-title').textContent = suggestion.title;
        document.getElementById('adaptive-meta').textContent  = '~' + suggestion.readTimeMin + ' min · ' + suggestion.wordCount + ' words';
        document.getElementById('adaptive-link').href = 'read.html?story=' + suggestion.id;
        document.getElementById('adaptive-card').style.display = 'flex';
      }).catch(() => {});
    })();

    // Confetti
    function startConfetti() {
      const colors = ['#7c3aed','#ec4899','#f59e0b','#10b981','#2563eb','#dc2626'];
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        el.style.animationDelay = (Math.random() * 3) + 's';
        el.style.width = (8 + Math.random() * 8) + 'px';
        el.style.height = (12 + Math.random() * 10) + 'px';
        el.style.opacity = 0.85;
        container.appendChild(el);
      }
    }
  </script>
</body>
</html>
