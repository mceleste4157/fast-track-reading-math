<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Zone – FAST Track Reading & Math</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2563eb; --blue-soft: #dbeafe;
      --purple: #7c3aed; --purple-soft: #ede9fe;
      --orange: #f59e0b;
      --green: #10b981; --green-soft: #d1fae5;
      --bg: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      --surface: #ffffff; --border: rgba(0,0,0,0.08);
      --text: #1e1b4b; --muted: #6b7280; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    .nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-back { text-decoration: none; color: var(--blue); font-weight: 700; font-size: 0.95rem; }
    .nav-back:hover { text-decoration: underline; }
    .nav-title { font-size: 1.1rem; font-weight: 800; flex: 1; text-align: center; }
    .nav-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9rem; color: #fff; flex-shrink: 0;
    }

    .page { max-width: 960px; margin: 0 auto; padding: 32px 16px 60px; }

    /* LOCKED STATE */
    .locked-card {
      background: var(--surface); border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 32px; text-align: center; max-width: 520px; margin: 0 auto;
    }
    .lock-icon { font-size: 5rem; margin-bottom: 20px; }
    .locked-title { font-size: 1.7rem; font-weight: 800; margin-bottom: 12px; }
    .locked-desc { font-size: 1.05rem; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .locked-req {
      background: var(--orange); color: #fff;
      border-radius: 12px; padding: 16px 20px;
      font-size: 1rem; font-weight: 700; margin-bottom: 28px;
    }
    .best-score-wrap { margin-bottom: 28px; }
    .best-score-label { font-size: 0.9rem; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
    .best-score-bar-wrap { height: 12px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
    .best-score-bar { height: 100%; background: var(--orange); border-radius: 99px; transition: width 0.6s ease; }
    .best-score-stars { margin-top: 8px; font-size: 1.2rem; }

    .btn-library {
      display: inline-block; padding: 13px 28px;
      background: var(--blue); color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; text-decoration: none; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-library:hover { background: #1d4ed8; }

    /* UNLOCKED STATE */
    .unlocked-header {
      text-align: center; margin-bottom: 36px;
    }
    .unlocked-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .unlocked-header p { color: var(--muted); font-size: 1.05rem; }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .topic-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(37,99,235,0.10);
      overflow: hidden; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
    }
    .topic-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(37,99,235,0.18); }
    .topic-cover {
      height: 110px; display: flex; align-items: center;
      justify-content: center; font-size: 3.5rem;
    }
    .topic-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .topic-label {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 3px 10px; border-radius: 99px; margin-bottom: 8px;
      background: var(--blue-soft); color: var(--blue);
    }
    .topic-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .topic-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 14px; }
    .topic-stars { color: var(--orange); font-size: 0.95rem; margin-bottom: 8px; }
    .btn-start {
      display: block; width: 100%; padding: 10px;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      text-align: center; transition: background 0.15s;
      background: var(--blue); color: #fff;
    }
    .btn-start:hover { background: #1d4ed8; }
    .btn-done { background: var(--green-soft); color: #065f46; }
    .btn-done:hover { background: #a7f3d0; }

    /* XP display */
    .total-xp-bar {
      background: var(--surface); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 28px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .total-xp-num { font-size: 1.6rem; font-weight: 800; color: var(--blue); }
    .total-xp-label { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="library.html" class="nav-back">← Library</a>
    <div class="nav-title">📐 Math Zone</div>
    <div class="nav-avatar" id="nav-avatar"></div>
  </nav>

  <div class="page" id="page-content">
    <div style="text-align:center;padding:60px;color:var(--muted);">Loading…</div>
  </div>

  <script src="math-data.js"></script>
  <script src="/__/firebase/10.0.0/firebase-app-compat.js"></script>
  <script src="/__/firebase/10.0.0/firebase-firestore-compat.js"></script>
  <script src="/__/firebase/init.js"></script>
  <script>
    const profile = (() => { try { return JSON.parse(localStorage.getItem('readerProfile')); } catch(e) { return null; } })();
    if (!profile) { window.location.href = 'login.html'; }

    const av = document.getElementById('nav-avatar');
    av.style.background = profile.avatarColor || '#2563eb';
    if (profile.avatarEmoji) {
      av.textContent = profile.avatarEmoji;
    } else {
      av.textContent = profile.name.trim().charAt(0).toUpperCase();
    }

    // Grade-filtered math sets
    const grade = parseInt(profile.gradeLevel) || 4;
    const GRADE_MATH_SETS = MATH_SETS.filter(s =>
      Array.isArray(s.grades) && s.grades.includes(grade)
    );

    const MATH_UNLOCK_KEY   = 'mathUnlocked_' + profile.readerId;
    // Settings from parent portal (fall back to safe defaults if not set)
    const MATH_UNLOCK_SCORE  = profile.mathUnlockScore  ?? 3;  // 0 = always unlocked
    const READ_REQUIRED_MINS = profile.dailyReadMinutes ?? 30; // 0 = no requirement
    const MATH_LIMIT_MINS    = profile.dailyMathMinutes ?? 10; // 0 = no limit

    const READ_REQUIRED_SECS = READ_REQUIRED_MINS * 60;
    const MATH_LIMIT_SECS    = MATH_LIMIT_MINS === 0 ? Infinity : MATH_LIMIT_MINS * 60;
    const db = firebase.firestore();

    // ─── Daily reading prerequisite ───────────────────────────────────────────
    const READ_DATE_KEY  = 'readTimeDate_' + profile.readerId;
    const READ_SECS_KEY  = 'readTimeSecs_' + profile.readerId;

    // ─── Daily math time limit ────────────────────────────────────────────────
    const MATH_DATE_KEY  = 'mathTimeDate_' + profile.readerId;
    const MATH_SECS_KEY  = 'mathTimeSecs_' + profile.readerId;
    const todayStr        = new Date().toISOString().slice(0, 10);

    // Reset both counters on a new day
    if (localStorage.getItem(MATH_DATE_KEY) !== todayStr) {
      localStorage.setItem(MATH_DATE_KEY, todayStr);
      localStorage.setItem(MATH_SECS_KEY, '0');
    }
    if (localStorage.getItem(READ_DATE_KEY) !== todayStr) {
      localStorage.setItem(READ_DATE_KEY, todayStr);
      localStorage.setItem(READ_SECS_KEY, '0');
    }

    const mathSecsToday = parseInt(localStorage.getItem(MATH_SECS_KEY) || '0');
    const readSecsToday = parseInt(localStorage.getItem(READ_SECS_KEY) || '0');
    const mathTimedOut  = MATH_LIMIT_MINS > 0 && mathSecsToday >= MATH_LIMIT_SECS;
    const readingDone   = READ_REQUIRED_MINS === 0 || readSecsToday >= READ_REQUIRED_SECS;

    // ─── Check unlock status then render ──────────────────────────────────────
    // If parent set unlock score to 0, treat as always unlocked
    if (MATH_UNLOCK_SCORE === 0) localStorage.setItem(MATH_UNLOCK_KEY, 'true');

    function renderPage(unlocked, mathProgress, bestReadScore) {
      const page = document.getElementById('page-content');

      if (!unlocked) {
        // ── LOCKED: haven't earned 3 stars yet ──────────────────────────────
        const barPct = Math.min(100, (bestReadScore / MATH_UNLOCK_SCORE) * 100);
        let starsHtml = '';
        for (let i = 0; i < 5; i++) starsHtml += i < bestReadScore ? '⭐' : '☆';

        page.innerHTML = `
          <div class="locked-card">
            <div class="lock-icon">🔒</div>
            <div class="locked-title">Math Zone is Locked</div>
            <div class="locked-desc">
              Complete a reading quiz and earn at least <strong>3 stars ⭐⭐⭐</strong>
              to unlock the Math Zone!
            </div>
            <div class="locked-req">📖 Your best reading score: ${bestReadScore}/5 stars</div>
            <div class="best-score-wrap">
              <div class="best-score-label">Progress toward unlock (need 3 stars)</div>
              <div class="best-score-bar-wrap">
                <div class="best-score-bar" style="width:${barPct}%"></div>
              </div>
              <div class="best-score-stars">${starsHtml}</div>
            </div>
            <a href="library.html" class="btn-library">📚 Go Read a Story →</a>
          </div>
        `;
      } else if (!readingDone) {
        // ── READING GATE: need reading before math today ─────────────────────
        const readMinsDone   = Math.floor(readSecsToday / 60);
        const readMinsNeeded = READ_REQUIRED_MINS;
        const barPct = Math.min(100, Math.round((readSecsToday / READ_REQUIRED_SECS) * 100));
        page.innerHTML = `
          <div class="locked-card">
            <div class="lock-icon">📖</div>
            <div class="locked-title">Read First!</div>
            <div class="locked-desc">
              Math Zone opens after <strong>30 minutes of reading</strong> each day.
              You've read <strong>${readMinsDone} min</strong> today — almost there!
            </div>
            <div class="locked-req" style="background:var(--purple)">
              📚 ${readMinsNeeded - readMinsDone} more minute${readMinsNeeded - readMinsDone === 1 ? '' : 's'} of reading to unlock math today!
            </div>
            <div class="best-score-wrap">
              <div class="best-score-label">Today's reading time (need ${readMinsNeeded} min)</div>
              <div class="best-score-bar-wrap">
                <div class="best-score-bar" style="width:${barPct}%;background:var(--purple)"></div>
              </div>
              <div class="best-score-stars" style="font-size:0.9rem;color:var(--muted);">
                ${readMinsDone} / ${readMinsNeeded} minutes
              </div>
            </div>
            <a href="library.html" class="btn-library" style="background:var(--purple)">📚 Go Read a Story →</a>
          </div>
        `;
      } else if (mathTimedOut) {
        // ── DAILY MATH TIME LIMIT REACHED ───────────────────────────────────
        page.innerHTML = `
          <div class="locked-card">
            <div class="lock-icon">📚</div>
            <div class="locked-title">Reading Time!</div>
            <div class="locked-desc">
              You've done <strong>10 minutes of math</strong> today — great work!
              Come back tomorrow for more math after reading.
            </div>
            <div class="locked-req" style="background:var(--purple)">📖 Keep building those reading skills!</div>
            <a href="library.html" class="btn-library" style="background:var(--purple)">📚 Go Read a Story →</a>
          </div>
        `;
      } else {
        // ── UNLOCKED ────────────────────────────────────────────────────────
        const totalMathXp = Object.values(mathProgress).reduce((s, p) => s + (p.xpEarned || 0), 0);
        const completedCount = GRADE_MATH_SETS.filter(s => mathProgress[s.id]).length;

        // Content for grade
        const setsHtml = GRADE_MATH_SETS.length === 0
          ? `<div style="text-align:center;padding:48px 16px;color:var(--muted);">
              <div style="font-size:3rem;margin-bottom:16px;">📐</div>
              <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;">More math topics coming soon!</div>
              <div style="font-size:0.9rem;">Check back as more grade ${grade} content gets added.</div>
            </div>`
          : `<div class="topic-grid">
              ${GRADE_MATH_SETS.map(set => {
                const prog = mathProgress[set.id];
                let starsHtml = '';
                if (prog) {
                  for (let i = 0; i < 8; i++) starsHtml += i < (prog.starsEarned || 0) ? '⭐' : '☆';
                }
                return `<a href="math-quiz.html?set=${set.id}" class="topic-card">
                  <div class="topic-cover" style="background:${set.coverColor}20;">${set.coverEmoji}</div>
                  <div class="topic-body">
                    <span class="topic-label">${set.topic.replace('-', ' ')}</span>
                    <div class="topic-title">${set.title}</div>
                    <div class="topic-meta">8 questions</div>
                    ${prog ? `<div class="topic-stars">${starsHtml} ${prog.starsEarned}/8</div>` : ''}
                    <button class="btn-start ${prog ? 'btn-done' : ''}" onclick="event.preventDefault(); window.location='math-quiz.html?set=${set.id}'">
                      ${prog ? '⭐ Practice Again' : 'Start →'}
                    </button>
                  </div>
                </a>`;
              }).join('')}
            </div>`;

        page.innerHTML = `
          <div class="unlocked-header">
            <h1>📐 Math Zone</h1>
            <p>Choose a topic and start practicing!</p>
            <p style="margin-top:8px;font-size:0.85rem;color:var(--muted);">
              ${MATH_LIMIT_MINS === 0
                ? '⏱️ No daily time limit set'
                : '⏱️ ' + Math.max(0, Math.round((MATH_LIMIT_SECS - mathSecsToday) / 60)) + ' min of math time left today'}
            </p>
          </div>
          <div class="total-xp-bar">
            <div>
              <div class="total-xp-num">+${totalMathXp} XP</div>
              <div class="total-xp-label">Math XP earned</div>
            </div>
            <div style="margin-left:auto;font-size:0.9rem;color:var(--muted);">
              ${completedCount} / ${GRADE_MATH_SETS.length} topics completed
            </div>
          </div>
          ${setsHtml}
        `;
      }
    }

    // ─── Load data from Firestore ──────────────────────────────────────────────
    let unlocked = localStorage.getItem(MATH_UNLOCK_KEY) === 'true';
    let bestReadScore = 0;
    const mathProgress = {};

    // Always query Firestore to get latest data
    Promise.all([
      // Reading progress (for best score / unlock check)
      db.collection('Progress')
        .where('readerId', '==', profile.readerId)
        .get(),
      // Math progress
      db.collection('MathProgress')
        .where('readerId', '==', profile.readerId)
        .get()
    ]).then(([readSnap, mathSnap]) => {
      // Find best reading score
      readSnap.forEach(d => {
        const score = d.data().quizScore || 0;
        if (score > bestReadScore) bestReadScore = score;
      });

      // Update unlock status
      if (!unlocked && bestReadScore >= MATH_UNLOCK_SCORE) {
        unlocked = true;
        localStorage.setItem(MATH_UNLOCK_KEY, 'true');
      }

      // Build math progress map (best per set)
      mathSnap.forEach(d => {
        const data = d.data();
        if (!mathProgress[data.setId] || data.starsEarned > mathProgress[data.setId].starsEarned) {
          mathProgress[data.setId] = data;
        }
      });

      renderPage(unlocked, mathProgress, bestReadScore);
    }).catch(() => {
      renderPage(unlocked, mathProgress, 0);
    });

    // Show initial state fast (before Firestore loads)
    renderPage(unlocked, {}, 0);  // reading gate check uses localStorage, no Firestore needed
  </script>
</body>
</html>
